<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Attendance System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Smart Attendance System</a>

        <div>
            <a href="/" class="btn btn-outline-light me-2">Home</a>
            <a href="/register/" class="btn btn-outline-light me-2">Register Student</a>
            <a href="/reports/" class="btn btn-outline-light">Reports</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} shadow-sm">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</div>

<footer class="text-center mt-5 mb-3 text-muted">
    <p>Python Lab Minor Project | Face Recognition Attendance System</p>
</footer>

</body>
</html>
